services:
  - type: web
    name: suarausaha-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://suarausaha-api.onrender.com
      - key: FRONTEND_ORIGIN
        value: https://suarausaha-web.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PARSER_ENGINE
        value: deterministic

  - type: web
    name: suarausaha-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://suarausaha-web.onrender.com
      - key: VITE_FRONTEND_ORIGIN
        value: https://suarausaha-web.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://suarausaha-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
